version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hrm_postgres
    environment:
      POSTGRES_USER: hrm_user
      POSTGRES_PASSWORD: hrm_password
      POSTGRES_DB: hrm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres_data:
