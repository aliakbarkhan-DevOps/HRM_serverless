server {
    listen 80;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Auth service routes
    location /auth {
        proxy_pass http://auth-service:3001;
    }

    # Employee service routes
    location /employees {
        proxy_pass http://employee-service:3002;
    }

    # Attendance service routes
    location /attendance {
        proxy_pass http://attendance-service:3003;
    }

    # Payroll service routes
    location /payroll {
        proxy_pass http://payroll-service:3004;
    }

    # Leave service routes
    location /leave {
        proxy_pass http://leave-service:3005;
    }

    # Recruitment service routes
    location /jobs {
        proxy_pass http://recruitment-service:3006;
    }

    # Performance service routes
    location /performance {
        proxy_pass http://performance-service:3007;
    }

    # Frontend Vite Dev Server
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
