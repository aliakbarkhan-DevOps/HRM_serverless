service: leave-service

provider:
  name: aws
  runtime: java17
  region: us-east-1
  environment:
    DB_HOST: ${env:DB_HOST, 'localhost'}
    DB_NAME: ${env:DB_NAME, 'hrm_db'}
    DB_USER: ${env:DB_USER, 'hrm_user'}
    DB_PASSWORD: ${env:DB_PASSWORD, 'hrm_password'}

package:
  artifact: target/leave-service-1.0-SNAPSHOT.jar

functions:
  leaveApp:
    handler: com.hrm.leave.LeaveHandler
    events:
      - http:
          path: /leave/{proxy+}
          method: any
          cors: true
      - http:
          path: /leave
          method: any
          cors: true
