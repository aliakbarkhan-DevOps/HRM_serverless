service: payroll-service

provider:
  name: aws
  runtime: python3.9
  region: us-east-1
  environment:
    DB_HOST: ${env:DB_HOST, 'localhost'}
    DB_NAME: ${env:DB_NAME, 'hrm_db'}
    DB_USER: ${env:DB_USER, 'hrm_user'}
    DB_PASSWORD: ${env:DB_PASSWORD, 'hrm_password'}

plugins:
  - serverless-python-requirements
  - serverless-offline

custom:
  pythonRequirements:
    dockerizePip: non-linux

functions:
  app:
    handler: app.handler
    events:
      - http:
          path: /payroll/{proxy+}
          method: any
          cors: true
